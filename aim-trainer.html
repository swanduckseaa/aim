<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mobile Aim Trainer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.92);
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hud {
      padding: 12px;
      background: var(--panel);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(2, 6, 23, 0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      min-height: 40px;
    }

    .pill button {
      background: none;
      border: none;
      color: var(--text);
      font-size: inherit;
      width: 100%;
      height: 100%;
      padding: 0;
    }

    .pill select {
      background: transparent;
      color: var(--text);
      border: none;
      width: 100%;
      font-size: inherit;
      outline: none;
    }

    .slider-wrap {
      flex: 1;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .playfield {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }

    .crosshair {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
    }

    .crosshair::before, .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.95);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .crosshair::before { width: 2px; height: 12px; }
    .crosshair::after { width: 12px; height: 2px; }

    .target {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
      transform: translate(-50%, -50%);
      transition: transform 120ms ease-out;
      user-select: none;
      -webkit-user-select: none;
    }

    .target.hit {
      transform: translate(-50%, -50%) scale(1.2);
      background: var(--accent-2);
    }

    .target.head { width: 26px; height: 26px; }
    .target.torso { width: 40px; height: 40px; }
    .target.legs { width: 56px; height: 56px; }

    .stats {
      position: absolute;
      left: 12px;
      bottom: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      background: rgba(2, 6, 23, 0.74);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      min-width: 74px;
      text-align: center;
    }

    .stat strong { display: block; font-size: 16px; }

    @media (max-width: 700px) {
      .hud { grid-template-columns: 1fr; }
      .controls { padding: 8px 10px; }
      .pill { flex: 1 1 calc(50% - 8px); }
      .slider-wrap { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div>
        <div class="title">Mobile Aim Trainer</div>
        <div class="subtitle">Practice target timing on a safe, local-only trainer.</div>
      </div>
      <div class="pill"><button id="toggleBtn">Start</button></div>
    </div>

    <div class="controls">
      <div class="pill">
        <select id="targetMode">
          <option value="head">Head</option>
          <option value="torso">Torso</option>
          <option value="legs">Legs</option>
        </select>
      </div>
      <div class="slider-wrap">
        <label for="fovRange">FOV: <span id="fovValue">70</span></label>
        <input id="fovRange" type="range" min="20" max="120" value="70" />
      </div>
    </div>

    <div class="playfield" id="playfield">
      <div class="crosshair" id="crosshair"></div>
      <div class="stats">
        <div class="stat">Score<br /><strong id="score">0</strong></div>
        <div class="stat">Hits<br /><strong id="hits">0</strong></div>
        <div class="stat">Time<br /><strong id="timer">0s</strong></div>
      </div>
    </div>
  </div>

  <script>
    const playfield = document.getElementById('playfield');
    const targetMode = document.getElementById('targetMode');
    const fovRange = document.getElementById('fovRange');
    const fovValue = document.getElementById('fovValue');
    const toggleBtn = document.getElementById('toggleBtn');
    const scoreEl = document.getElementById('score');
    const hitsEl = document.getElementById('hits');
    const timerEl = document.getElementById('timer');
    const crosshair = document.getElementById('crosshair');

    let running = false;
    let score = 0;
    let hits = 0;
    let seconds = 0;
    let timerId = null;
    let target = null;

    function updateFov() {
      const fov = Number(fovRange.value);
      fovValue.textContent = fov;
      playfield.style.setProperty('--fov', `${fov}`);
    }

    function startTimer() {
      clearInterval(timerId);
      timerId = setInterval(() => {
        seconds += 1;
        timerEl.textContent = `${seconds}s`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
    }

    function placeTarget() {
      if (!running) return;
      if (target) target.remove();

      const rect = playfield.getBoundingClientRect();
      const x = Math.random() * (rect.width - 80) + 40;
      const y = Math.random() * (rect.height - 80) + 40;
      const mode = targetMode.value;

      const el = document.createElement('div');
      el.className = `target ${mode}`;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        hitTarget(el);
      });
      playfield.appendChild(el);
      target = el;
    }

    function hitTarget(el) {
      if (!running) return;
      if (el !== target) return;
      score += 1;
      hits += 1;
      scoreEl.textContent = score;
      hitsEl.textContent = hits;
      el.classList.add('hit');
      window.setTimeout(() => {
        if (target === el) {
          placeTarget();
        }
      }, 120);
    }

    function toggleTraining() {
      running = !running;
      toggleBtn.textContent = running ? 'Stop' : 'Start';
      if (running) {
        score = 0;
        hits = 0;
        seconds = 0;
        scoreEl.textContent = score;
        hitsEl.textContent = hits;
        timerEl.textContent = '0s';
        startTimer();
        placeTarget();
      } else {
        stopTimer();
        if (target) {
          target.remove();
          target = null;
        }
      }
    }

    playfield.addEventListener('pointermove', (event) => {
      const rect = playfield.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      crosshair.style.left = `${x}px`;
      crosshair.style.top = `${y}px`;
    });

    playfield.addEventListener('pointerleave', () => {
      crosshair.style.opacity = '0';
    });

    playfield.addEventListener('pointerenter', () => {
      crosshair.style.opacity = '1';
    });

    toggleBtn.addEventListener('click', toggleTraining);
    targetMode.addEventListener('change', () => {
      if (running) placeTarget();
    });
    fovRange.addEventListener('input', updateFov);
    window.addEventListener('resize', () => {
      if (running) placeTarget();
    });

    updateFov();
  </script>
</body>
</html>
